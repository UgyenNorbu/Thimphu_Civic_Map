<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Thimphu Civic Map</title>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>Thimphu Civic Map</h1>
        <div id="map"></div>
        
        <div id="modal-overlay">
            <div id="modal-box">
                <h2>Report an issue</h2>
                <label for="issue-type">Issue type</label>
                <select id="issue-type">
                    <option value="pothole">Road/footpath</option>
                    <option value="streetlight">Water supply</option>
                    <option value="drainage">Sewage</option>
                    <option value="manhole">Electricity/lighting</option>
                    <option value="manhole">Waste management</option>
                    <option value="other">Other</option>
                </select>

                <label for="issue-desc">Description</label>
                <textarea id="issue-desc" rows="3" placeholder="Briefly describe the issue"></textarea>

                <div id="modal-buttons">
                    <button id="modal-cancel">Cancel</button>
                    <button id="modal-submit">Submit</button>
                </div>
            </div>
        </div>
        <button id="locate-btn" title="Show my location">
            <svg viewBox="0 0 24 24" width="20" height="20">
                <circle cx="12" cy="12" r="3" fill="#555"/>
                <path d="M12 2 L12 5 M12 19 L12 22 M2 12 L5 12 M19 12 L22 12"
          stroke="#555" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script type="module" src="script.js"></script>
    </body>
</html>
